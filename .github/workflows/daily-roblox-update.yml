name: Daily Roblox update

on:
  push:
    branches:
      - main
  schedule:
    - cron: "20 1 * * *"
    - cron: "20 7 * * *"
    - cron: "20 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Update Roblox stats
        run: node scripts/update-roblox-stats.mjs

      - name: Deploy to Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Commit updated Roblox data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/roblox-portal/data.js work/roblox-auto-update-report.json
          if git diff --cached --quiet; then
            echo "No Roblox updates to commit."
          else
            git commit -m "Update Roblox live stats"
            git push
          fi
